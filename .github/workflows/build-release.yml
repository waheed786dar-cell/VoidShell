name: VoidShell CI/CD

on:
  push:
    branches: [main, develop]
    tags:     ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'release'
        type: choice
        options: [debug, release, both]

env:
  JAVA_VERSION:  '17'
  JAVA_DISTRO:   'temurin'

jobs:
  # ────────────────────────────────────────────────
  # JOB 1 — Lint
  # ────────────────────────────────────────────────
  lint:
    name: Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version:  ${{ env.JAVA_VERSION }}
          distribution:  ${{ env.JAVA_DISTRO }}
          cache:         gradle

      # NO wrapper-validation — network call karta tha
      - name: Make gradlew Executable
        run: chmod +x ./gradlew

      - name: Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/configuration-cache
          key:          gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/libs.versions.toml','**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Run Lint
        run: |
          ./gradlew lintDebug \
            --no-daemon \
            --stacktrace \
            --warning-mode all \
            -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Upload Lint Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           lint-${{ github.run_number }}
          path:           app/build/reports/lint-results-*.html
          retention-days: 7

  # ────────────────────────────────────────────────
  # JOB 2 — Unit Tests
  # ────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRO }}
          cache:        gradle

      - name: Make gradlew Executable
        run: chmod +x ./gradlew

      - name: Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key:          gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Run Tests
        run: |
          ./gradlew testDebugUnitTest \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           test-results-${{ github.run_number }}
          path:           app/build/reports/tests/
          retention-days: 7

  # ────────────────────────────────────────────────
  # JOB 3 — Build Debug APK
  # ────────────────────────────────────────────────
  build-debug:
    name: Debug APK
    runs-on: ubuntu-latest
    needs: test
    if: |
      github.event_name == 'pull_request' ||
      github.ref == 'refs/heads/develop'  ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type != 'release')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRO }}
          cache:        gradle

      - name: Make gradlew Executable
        run: chmod +x ./gradlew

      - name: Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/libs.versions.toml') }}

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g" \
            -Dorg.gradle.parallel=true \
            -Dorg.gradle.caching=true

      - name: List APK
        run: find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name:           VoidShell-Debug-${{ github.run_number }}
          path:           app/build/outputs/apk/debug/*.apk
          retention-days: 14

  # ────────────────────────────────────────────────
  # JOB 4 — Build + Sign Release APK
  # ────────────────────────────────────────────────
  build-release:
    name: Release APK (Signed)
    runs-on: ubuntu-latest
    needs: test
    if: |
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type != 'debug')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRO }}
          cache:        gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew Executable
        run: chmod +x ./gradlew

      - name: Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/libs.versions.toml') }}

      - name: Decode Keystore
        run: |
          mkdir -p keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > keystore/voidshell-release.keystore
          ls -lh keystore/

      - name: Get Version Name
        id: ver
        run: |
          VER=$(grep 'versionName' app/build.gradle.kts \
            | grep -o '"[^"]*"' | head -1 | tr -d '"')
          echo "VERSION=$VER" >> $GITHUB_OUTPUT
          echo "Version: $VER"

      - name: Build Release APKs (Split + Universal)
        env:
          STORE_PASS: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS:  ${{ secrets.KEY_ALIAS }}
          KEY_PASS:   ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx6g" \
            -Dorg.gradle.parallel=true \
            -Dorg.gradle.caching=true \
            -Pandroid.injected.signing.store.file="$PWD/keystore/voidshell-release.keystore" \
            -Pandroid.injected.signing.store.password="$STORE_PASS" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASS"

      - name: Build AAB (App Bundle)
        env:
          STORE_PASS: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS:  ${{ secrets.KEY_ALIAS }}
          KEY_PASS:   ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx6g" \
            -Pandroid.injected.signing.store.file="$PWD/keystore/voidshell-release.keystore" \
            -Pandroid.injected.signing.store.password="$STORE_PASS" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASS"

      - name: Rename APKs
        run: |
          VER=${{ steps.ver.outputs.VERSION }}
          cd app/build/outputs/apk/release/
          for f in *.apk; do
            mv "$f" "VoidShell-v${VER}-${f}"
          done
          echo "=== Output APKs ==="
          ls -lh

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name:           VoidShell-Release-v${{ steps.ver.outputs.VERSION }}-${{ github.run_number }}
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          retention-days: 60

      - name: APK Info
        run: |
          echo "=== Build Summary ==="
          echo "Version : ${{ steps.ver.outputs.VERSION }}"
          echo "Commit  : ${{ github.sha }}"
          echo "Branch  : ${{ github.ref_name }}"
          find app/build/outputs -name "*.apk" -exec sh -c 'echo "$(basename $1): $(du -h $1 | cut -f1)"' _ {} \;

  # ────────────────────────────────────────────────
  # JOB 5 — GitHub Release (Tags only)
  # ────────────────────────────────────────────────
  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern:        VoidShell-Release-*
          merge-multiple: true
          path:           ./artifacts

      - name: List Artifacts
        run: ls -lh ./artifacts/

      - name: Create Release Notes
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          cat > notes.md << NOTES
          ## 🔮 VoidShell $TAG

          **Offline Cyber Simulation Game — Android**

          ---

          ### Install Karo:
          1. APK download karo _(arm64-v8a recommended)_
          2. **Settings → Security → Unknown Sources** allow karo
          3. APK install karo
          4. Enjoy

          ### APK Types:
          | File | Device |
          |------|--------|
          | \`universal\` | Sab devices |
          | \`arm64-v8a\` | Modern phones (2018+) ✅ |
          | \`armeabi-v7a\` | Purane phones |
          | \`x86_64\` | Emulator / PC |

          **Minimum: Android 8.0 (API 26)**
          **Zero internet permissions**
          NOTES

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          name:       "VoidShell ${GITHUB_REF#refs/tags/}"
          body_path:  notes.md
          files:      artifacts/*.apk
          draft:      false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
