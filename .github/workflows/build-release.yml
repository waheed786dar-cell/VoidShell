name: VoidShell — Build, Sign & Release

on:
  push:
    branches: [main, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release, both]

env:
  JAVA_VERSION: '17'
  ANDROID_API: '35'
  BUILD_TOOLS: '35.0.0'

jobs:
  # ─── JOB 1: Code Quality ───────────────────────────
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: gradle-
          
      - name: Run Lint
        run: ./gradlew lint --stacktrace
        
      - name: Upload Lint Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: app/build/reports/lint-results-*.html

  # ─── JOB 2: Unit Tests ─────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ hashFiles('**/*.gradle*') }}
          
      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --stacktrace
        
      - name: Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: app/build/reports/tests/

  # ─── JOB 3: Build APK ──────────────────────────────
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          
      - name: Decode Keystore
        run: |
          mkdir -p keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore/voidshell-release.keystore
          
      - name: Make Gradlew Executable
        run: chmod +x ./gradlew
        
      - name: Build Debug APK
        if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
        run: ./gradlew assembleDebug --stacktrace
        
      - name: Build Release APK (Signed)
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$PWD/keystore/voidshell-release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}" \
            --stacktrace
            
      - name: Build Release AAB (Split)
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$PWD/keystore/voidshell-release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}" \
            --stacktrace
            
      - name: Get Version
        id: version
        run: |
          echo "VERSION=$(grep versionName app/build.gradle.kts | head -1 | grep -o '".*"' | tr -d '"')" >> $GITHUB_OUTPUT
          
      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/VoidShell-v${{ steps.version.outputs.VERSION }}-release.apk
             
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VoidShell-APK-${{ steps.version.outputs.VERSION }}
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          retention-days: 30
          
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: VoidShell-AAB-${{ steps.version.outputs.VERSION }}
          path: app/build/outputs/bundle/release/*.aab

  # ─── JOB 4: GitHub Release ─────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          pattern: VoidShell-APK-*
          merge-multiple: true
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: VoidShell ${{ github.ref_name }}
          body: |
            ## 🔮 VoidShell ${{ github.ref_name }}
            
            ### Cyber Simulation Engine — New Build
            
            **Installation:**
            1. APK download karo
            2. Unknown sources allow karo
            3. Install karo
            
            **Changes:** See commits
          files: "*.apk"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
