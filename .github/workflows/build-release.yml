name: VoidShell — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags:     ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release, both]

env:
  JAVA_VERSION:    '17'
  JAVA_DISTRO:     'temurin'
  ANDROID_API:     '35'
  BUILD_TOOLS_VER: '35.0.0'

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1 — Validate (lint + tests)
  # ──────────────────────────────────────────────────────────────
  validate:
    name: Lint + Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history for versioning

      - name: Verify gradlew exists
        run: |
          if [ ! -f "./gradlew" ]; then
            echo "❌ gradlew not found!"
            ls -la
            exit 1
          fi
          echo "✅ gradlew found"
          ls -lh gradlew gradle/wrapper/

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version:  ${{ env.JAVA_VERSION }}
          distribution:  ${{ env.JAVA_DISTRO }}
          cache:         gradle

      - name: Make gradlew Executable
        run: chmod +x ./gradlew

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v2

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/configuration-cache
          key:          gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/libs.versions.toml','**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Run Lint
        run: ./gradlew lintDebug --stacktrace --no-daemon

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --stacktrace --no-daemon

      - name: Upload Lint Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name:              lint-report-${{ github.run_number }}
          path:              app/build/reports/lint-results-*.html
          retention-days:    7

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name:              test-report-${{ github.run_number }}
          path:              app/build/reports/tests/
          retention-days:    7

  # ──────────────────────────────────────────────────────────────
  # JOB 2 — Build Debug APK
  # ──────────────────────────────────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version:  ${{ env.JAVA_VERSION }}
          distribution:  ${{ env.JAVA_DISTRO }}
          cache:         gradle

      - name: Make gradlew Executable
        run: chmod +x ./gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/libs.versions.toml') }}

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name:           VoidShell-Debug-${{ github.run_number }}
          path:           app/build/outputs/apk/debug/*.apk
          retention-days: 14

  # ──────────────────────────────────────────────────────────────
  # JOB 3 — Build & Sign Release APK
  # ──────────────────────────────────────────────────────────────
  build-release:
    name: Build + Sign Release APK
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version:  ${{ env.JAVA_VERSION }}
          distribution:  ${{ env.JAVA_DISTRO }}
          cache:         gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew Executable
        run: chmod +x ./gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/libs.versions.toml') }}

      - name: Decode Keystore
        run: |
          mkdir -p keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore/voidshell-release.keystore
          echo "Keystore size: $(wc -c < keystore/voidshell-release.keystore) bytes"

      - name: Build Release APK (All ABIs)
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            --stacktrace \
            --no-daemon \
            -Pandroid.injected.signing.store.file=$PWD/keystore/voidshell-release.keystore \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Build AAB (App Bundle)
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            --stacktrace \
            --no-daemon \
            -Pandroid.injected.signing.store.file=$PWD/keystore/voidshell-release.keystore \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: List Output Files
        run: |
          echo "=== APK Files ==="
          find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;
          echo "=== AAB Files ==="
          find app/build/outputs/bundle -name "*.aab" -exec ls -lh {} \;

      - name: Rename APKs (Clean names)
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | grep -o '"[^"]*"' | head -1 | tr -d '"')
          cd app/build/outputs/apk/release/
          for f in *.apk; do
            mv "$f" "VoidShell-v${VERSION}-${f}"
          done
          echo "Renamed APKs:"
          ls -lh

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name:           VoidShell-Release-${{ github.run_number }}
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          retention-days: 30

  # ──────────────────────────────────────────────────────────────
  # JOB 4 — GitHub Release (Only on tags)
  # ──────────────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Release Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern:        VoidShell-Release-*
          merge-multiple: true
          path:           ./release-artifacts

      - name: Generate Release Notes
        id: notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          cat << NOTES > release_notes.md
          ## 🔮 VoidShell $VERSION

          ### Offline Cyber Simulation Game Engine

          **Install karne ka tarika:**
          1. APK download karo (arm64-v8a recommended)
          2. Settings → Unknown sources → Allow
          3. APK install karo

          **APK Types:**
          - \`universal\` — Sab devices ke liye
          - \`arm64-v8a\` — Modern Android phones (recommended)
          - \`armeabi-v7a\` — Purane phones
          - \`x86_64\` — Emulators/PC Android

          **Requirements:** Android 8.0+ (API 26)
          NOTES

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name:       "VoidShell ${{ steps.notes.outputs.VERSION }}"
          body_path:  release_notes.md
          files:      release-artifacts/*.apk
          draft:      false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
